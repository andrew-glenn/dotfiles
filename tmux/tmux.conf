# Binding / Unbinding.

unbind +
unbind -
unbind [
bind Escape copy-mode
bind R source-file ~/.tmux.conf \; display "Config reloaded..."


# Alt+(LEFT/RIGHT/UP/DOWN)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-p paste-buffer


bind-key -n S-F11 if-shell "env | grep -i tmux_scratch" {run-shell "tmux detach -s scratch"}{ display-popup -xC -yC -w80% -h80% -E "tmux new-session -A -e TMUX_SCRATCH_SESSION=true -s scratch" }
bind-key -n S-F12 display-popup -xC -yC -w90% -h90% -E -d "#{pane_current_path}"
bind-key -n S-F10 display-popup -xC -yC -w100% -h100% -E -d "#{pane_current_path}" lazygit
bind-key -n S-F9 run-shell "${DOTFILES_GIT_REPO}/tmux/tmux.functions.sh prefix"
bind-key -n S-F8 run-shell "tmux display-popup -xC -yC -w60% -h50% -E '${DOTFILES_GIT_REPO}/tmux/tmux.functions.sh send_pane #{pane_id}'"


#bind-key -T root v display-popup -xC -yC -w90% -h90% -E nvim ~/.vimrc
#bind-key -T popup s if-shell "env | grep -i tmux_scratch" {run-shell "tmux detach -s scratch"}{ display-popup -xC -yC -w80% -h80% -E "tmux new-session -A -e TMUX_SCRATCH_SESSION=true -s scratch" }
#bind-key -T root C-F11 display-popup -xC -yC -w90% -h90% -E -d "#{pane_current_path}" lazygit
#bind-key -T popup / display-popup -xC -yC -w90% -h90% -E "grep -i 'bind-key -T popup' ~/.tmux.conf | more"
#
# bind-key 7 is reserved for spotify.

#bind-key -T vi-copy 'y' copy-selection

# New panes/splits/windows in the CWD
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
set -g bell-action other
# Mouse Mode
bind u run "source ${DOTFILES_GIT_REPO}/tmux/tmux.functions.sh &&  _toggle_mouse"

# Sync pances
bind s run "source ${DOTFILES_GIT_REPO}/tmux/tmux.functions.sh && _toggle_pane_sync"

# Silence Monitoring
bind-key m run "${DOTFILES_GIT_REPO}/tmux/tmux.functions.sh silence"
bind-key j display-popup -xC -yC -w90% -h90% -E "tmux list-sessions -F '#S' | fzf --reverse | xargs tmux switch-client -t"
bind-key k display-popup -xC -yC -w90% -h90% -E "tmux list-window -F '#W' | fzf --reverse | xargs tmux select-window -t"

# Pane jumper: all panes across all sessions, fzf-selected
bind-key P display-popup -xC -yC -w90% -h90% -E "${DOTFILES_GIT_REPO}/tmux/tmux.functions.sh pane_jumper"

# Switch to previous session
bind-key C-b run-shell "${DOTFILES_GIT_REPO}/tmux/tmux.functions.sh prev"

# Layout Shortcuts.
bind-key H select-layout even-vertical
bind-key T select-layout tiled
bind-key V select-layout even-horizontal

# Send Prefix.
bind-key a send-prefix
set -g default-terminal "screen-256color"
set -g renumber-windows on
set -g status-style bg=default,fg=white
#set -g status-fg white
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"
set -g status-position top
set -g status-interval 30
set -g pane-active-border-style fg=colour33
set -g @theme-clock-mode-colour colour9
set -g @powerline-status-right-area-left-fg colour9
set-environment -g 'SSH_AUTH_SOCK' ~/.ssh/ssh_auth_sock
set-option -g allow-rename off
run-shell "${DOTFILES_GIT_REPO}/tmux/tmux.functions.sh theme"
set-window-option -g aggressive-resize on
setw -g mode-keys vi


setw -g window-status-current-format ' #[fg=colour255]#I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-format ' #[fg=colour255]#I:#W#[fg=colour50]#F'

# ==============================================================================
# Custom theme overrides — minimal brackets. Off-white text, single cyan
# accent, no backgrounds. Delete everything below to revert.
# ==============================================================================

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Palette — host-conditional, set by _host_specific_theme in
# tmux.functions.sh (invoked from the run-shell line near the top of this
# file). Styles below reference these user options; format expansion at
# render time picks up whatever the function set.
#   @c_text   = primary text
#   @c_dim    = separators, idle bits
#   @c_accent = active window, session, borders
#   @c_actv   = activity flash
#   colour196 = red bell (shared)

# --- Status bar ----------------------------------------------------------------
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=default,fg=#{@c_text}"

# Left: [session]  SYNC?  SSH host?
set -g status-left-length 80
set -g status-left "#[fg=#{@c_accent},bold][#S]#[fg=#{@c_text}] #{?pane_synchronized,#[fg=colour196#,bold] SYNC ,}#(${DOTFILES_GIT_REPO}/tmux/tmux.status.sh ssh #{pane_pid}) "

# Right: load  ·  local / utcZ
set -g status-right-length 80
set -g status-right "#[fg=#{@c_dim}]#(awk '{print $1}' /proc/loadavg)   #(${DOTFILES_GIT_REPO}/tmux/tmux.status.sh battery)   #[fg=#{@c_text}]%H:%M #[fg=#{@c_dim}]/ #[fg=#{@c_text}]#(date -u +%%H:%%M) #[fg=#{@c_dim}]UTC"

# Windows: inactive = dim, active = bracketed accent
setw -g window-status-style "fg=#{@c_dim}"
setw -g window-status-current-style "fg=#{@c_accent},bold"
setw -g window-status-format " #I·#W#F "
setw -g window-status-current-format "#[fg=#{@c_accent},bold][#I#[fg=#{@c_dim}]·#[fg=#{@c_accent}]#W#F]"
setw -g window-status-activity-style "fg=#{@c_actv},bold"
setw -g window-status-bell-style "fg=colour196,bold"
setw -g window-status-separator ""

# Subtle activity flash on idle windows (no popup message)
setw -g monitor-activity on
set -g visual-activity off
setw -g monitor-silence 0
set -g visual-silence off

# --- Panes ---------------------------------------------------------------------
set -g pane-border-style "fg=#{@c_dim}"
set -g pane-active-border-style "fg=#{@c_accent}"
set -g pane-border-lines single
set -g pane-border-status off

# --- Message / command prompt --------------------------------------------------
set -g message-style "fg=#{@c_accent},bold"
set -g message-command-style "fg=#{@c_text},bold"

# --- Mode (copy/selection) -----------------------------------------------------
setw -g mode-style "bg=#{@c_accent},fg=colour16,bold"

# --- Clock: giant green CRT clock (with seconds, since tmux's builtin won't) ---
setw -g clock-mode-colour colour46
setw -g clock-mode-style 24
# Override prefix-t: fullscreen popup running tty-clock (24hr, seconds).
# Falls back to figlet -> plain date.
# Exit: press any key (q, Esc, Enter, whatever). Ctrl-c also works.
bind-key t display-popup -xC -yC -w90% -h90% -E "\
  if command -v tty-clock >/dev/null 2>&1; then \
    tty-clock -cS; \
  elif command -v figlet >/dev/null 2>&1; then \
    tput civis; trap 'tput cnorm; clear' EXIT INT TERM; \
    while :; do clear; printf '\\033[32m'; figlet -f big \"\$(date +%H:%M:%S)\"; printf '\\n\\033[2m[any key to exit]\\033[0m\\n'; read -rsn1 -t 1 && break; done; \
  else \
    tput civis; trap 'tput cnorm; clear' EXIT INT TERM; \
    while :; do clear; printf '\\033[1;32m%s\\033[0m\\n\\n\\033[2m[any key to exit]\\033[0m\\n' \"\$(date '+%H:%M:%S  %Y-%m-%d')\"; read -rsn1 -t 1 && break; done; \
  fi"
# --- Bell: quiet by default ----------------------------------------------------
set -g visual-bell off
set -g visual-activity off
set -g bell-action none

# ==============================================================================
