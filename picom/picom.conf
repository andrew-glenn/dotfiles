backend = "glx";
vsync = true;

# unfocused windows dim slightly — but alacritty self-manages opacity,
# so exclude it from this rule to keep its 0.85 constant whether focused or not.
inactive-opacity = 0.85;
active-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "93:class_g = 'Alacritty'"
];

focus-exclude = [
  "class_g = 'Alacritty'"
];

# fading is cheap polish
fading = true;
fade-in-step = 0.013;
fade-out-step = 0.013;
fade-delta = 6;

# subtle shadows — keep minimal for the CRT look
shadow = false;

detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = true;

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.95; focus = true; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};
