# Kitty Config — ported from Ghostty

# Behavior
macos_titlebar_color background
macos_quit_when_last_window_closed yes
confirm_os_window_close 0
scrollback_lines 999999

# Font
font_family Hack Nerd Font Mono
font_size 14
allow_remote_control yes
# Window / padding
window_padding_width 20 45

# Background
background_opacity 1.0

# Keybindings
map super+shift+f toggle_fullscreen
map super+enter send_text all \x1b[13;3u

# Colors (managed by ~/bin/display-mode — edit colors-hacker.conf / colors-daylight.conf)
include colors-active.conf
