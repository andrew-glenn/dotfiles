# Kitty Config — ported from Ghostty

# Behavior
macos_titlebar_color background
macos_quit_when_last_window_closed yes
confirm_os_window_close 0
scrollback_lines 999999

# Font
font_family Hack Nerd Font Mono
font_size 14
allow_remote_control yes
# Window / padding
window_padding_width 20 45

# Background
background_opacity 1.0

# Keybindings
map super+shift+f toggle_fullscreen
map super+enter send_text all \x1b[13;3u

# Colors
background #0a0a0a
foreground #f4e8da
cursor #f0a050
cursor_shape block
cursor_blink_interval 0.5
selection_background #5a4030
selection_foreground #fff8f0

# Normal colors (0-7)
color0 #3d3028
color1 #f04848
color2 #6cd42e
color3 #f0b020
color4 #38b0f0
color5 #d060f0
color6 #00d4a8
color7 #e0d4c6

# Bright colors (8-15)
color8 #5c4a3e
color9 #ff6060
color10 #80ee44
color11 #ffc830
color12 #50c8ff
color13 #e878ff
color14 #20eec0
color15 #f5ece0
