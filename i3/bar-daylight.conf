# i3bar — daylight (tropical palette)
bar {
        status_command i3status -c ~/.config/i3status/config
        separator_symbol " · "
        colors {
                background #d0eaf5
                statusline #1a2828
                separator  #6a9aaa

                # class            border  backgr  text
                focused_workspace  #1a7aaa #c0dce8 #1a2828
                active_workspace   #6a9aaa #d8eef5 #1a2828
                inactive_workspace #8aaaaa #e8f5f8 #4a6868
                urgent_workspace   #cc2200 #fce8e8 #cc2200
        }
}
